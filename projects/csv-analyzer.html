<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CSV Data Analyzer — Azure Cosmos DB</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>window.PORTFOLIO_API_BASE = ''/* ← your Azure Function URL */;</script>
  <script src="../js/api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=Space+Mono&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0f14;--surface:#14171f;--surface2:#1a1e28;--border:#222636;--accent:#f0a83e;--accent2:#3ef0c8;--text:#e2e6f0;--muted:#6b7280;--mono:'Space Mono',monospace}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    header{padding:.9rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:10}
    header h1{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
    .badge{background:rgba(240,168,62,.1);border:1px solid rgba(240,168,62,.25);color:var(--accent);font-family:var(--mono);font-size:.7rem;padding:.2rem .6rem;border-radius:999px}
    .db-badge{background:rgba(62,240,200,.1);border:1px solid rgba(62,240,200,.25);color:var(--accent2);font-family:var(--mono);font-size:.7rem;padding:.2rem .6rem;border-radius:999px}
    .status-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:.35rem 1.5rem;font-family:var(--mono);font-size:.7rem;color:var(--muted)}
    .main{padding:1.5rem;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem}
    .drop-zone{border:2px dashed var(--border);border-radius:16px;padding:2.5rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);position:relative}
    .drop-zone.dragover{border-color:var(--accent);background:rgba(240,168,62,.04)}
    .drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .drop-icon{font-size:2.5rem;margin-bottom:.75rem}
    .drop-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:.4rem}
    .drop-sub{color:var(--muted);font-size:.88rem}
    .sample-btn{display:inline-block;margin-top:1rem;background:rgba(240,168,62,.1);border:1px solid rgba(240,168,62,.3);color:var(--accent);border-radius:8px;padding:.45rem 1.1rem;cursor:pointer;font-size:.83rem;transition:all .2s;position:relative;z-index:1}
    .sample-btn:hover{background:rgba(240,168,62,.2)}
    #analysis{display:none;flex-direction:column;gap:1.25rem}
    .file-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
    .file-info-name{font-weight:600;font-size:.9rem}
    .file-info-meta{font-family:var(--mono);font-size:.72rem;color:var(--muted)}
    .pills{display:flex;gap:.4rem;flex-wrap:wrap}
    .pill{background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:.22rem .7rem;font-family:var(--mono);font-size:.7rem;color:var(--muted)}
    .pill.g{color:var(--accent2);border-color:rgba(62,240,200,.2)}
    .pill.cosmos{color:var(--accent);border-color:rgba(240,168,62,.25);background:rgba(240,168,62,.05)}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.9rem}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;transition:transform .18s}
    .stat-card:hover{transform:translateY(-2px)}
    .stat-col-name{font-family:var(--mono);font-size:.73rem;color:var(--accent);margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem}
    .type-badge{font-size:.6rem;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:.08rem .32rem;margin-left:.4rem}
    .stat-row{display:flex;justify-content:space-between;font-size:.76rem;padding:.22rem 0;border-bottom:1px solid var(--border)}
    .stat-row:last-child{border-bottom:none}
    .stat-row span:first-child{color:var(--muted)}
    .stat-row span:last-child{font-family:var(--mono);color:var(--text)}
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem}
    .chart-card h3{font-size:.83rem;font-weight:600;margin-bottom:.6rem}
    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:auto}
    .table-wrap h3{padding:.9rem 1.1rem;border-bottom:1px solid var(--border);font-size:.88rem;font-weight:600}
    table{width:100%;border-collapse:collapse}
    th{background:var(--surface2);color:var(--muted);font-family:var(--mono);font-size:.66rem;text-transform:uppercase;padding:.45rem .7rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:.38rem .7rem;border-bottom:1px solid var(--border);font-size:.78rem;white-space:nowrap;max-width:170px;overflow:hidden;text-overflow:ellipsis}
    .history-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .history-section h3{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);font-size:.85rem;font-weight:600}
    .hist-item{padding:.6rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;font-size:.82rem}
    .hist-item:last-child{border-bottom:none}
    .hist-icon{font-size:1.1rem}
    .hist-body{flex:1}
    .hist-name{font-weight:500}
    .hist-meta{font-size:.72rem;color:var(--muted);font-family:var(--mono)}
    ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    @media(max-width:700px){.charts-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:.75rem"><span style="font-size:1.3rem">📂</span><h1>CSV Data Analyzer</h1></div>
  <div style="display:flex;gap:.5rem">
    <span class="badge">EDA · Instant Stats</span>
    <span class="db-badge">☁️ History → Cosmos DB</span>
  </div>
</header>
<div class="status-bar" id="db-status">Connecting to Azure Cosmos DB…</div>

<div class="main">
  <div class="drop-zone" id="drop-zone">
    <input type="file" accept=".csv,.tsv,.txt" id="file-input" onchange="handleFile(this.files[0])"/>
    <div class="drop-icon">📁</div>
    <div class="drop-title">Drop your CSV file here</div>
    <div class="drop-sub">or click to browse · supports .csv, .tsv</div>
    <div class="sample-btn" onclick="loadSample(event)">📊 Load Sample Sales Dataset</div>
  </div>

  <div class="history-section" id="history-section" style="display:none">
    <h3>☁️ Analysis History — Azure Cosmos DB</h3>
    <div id="history-list"></div>
  </div>

  <div id="analysis">
    <div class="file-info" id="file-info"></div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="charts-row">
      <div class="chart-card"><h3 id="hist-title">Distribution</h3><canvas id="hist-chart" height="180"></canvas></div>
      <div class="chart-card"><h3 id="bar-title">Top Categories</h3><canvas id="bar-chart" height="180"></canvas></div>
    </div>
    <div class="table-wrap">
      <h3>Data Preview <span style="font-size:.75rem;color:var(--muted);font-weight:400">(first 50 rows)</span></h3>
      <div id="table-div" style="overflow:auto;max-height:300px"></div>
    </div>
  </div>
</div>

<script>
let HC,BC;

const SAMPLE=`date,product,category,region,units,revenue,cost
2024-01-05,Laptop Pro,Computers,North America,3,3600,2100
2024-01-08,Tablet Air,Computers,Europe,5,3250,1950
2024-01-12,SmartPhone X,Phones,Asia Pacific,8,7200,4200
2024-01-15,Monitor 4K,Displays,North America,2,1100,660
2024-01-20,Keyboard Elite,Peripherals,Latin America,12,1800,1080
2024-02-02,Mouse Precision,Peripherals,Europe,20,1600,960
2024-02-07,Headset Pro,Audio,Middle East,6,1200,720
2024-02-10,Webcam HD,Cameras,North America,4,480,288
2024-02-14,SSD 1TB,Storage,Asia Pacific,15,1500,900
2024-02-18,Router WiFi6,Networking,Europe,7,1260,756
2024-03-03,Laptop Pro,Computers,Middle East,2,2400,1400
2024-03-06,Tablet Air,Computers,North America,4,2600,1560
2024-03-11,SmartPhone X,Phones,Latin America,10,9000,5250
2024-03-15,Monitor 4K,Displays,Europe,3,1650,990
2024-03-19,Keyboard Elite,Peripherals,Asia Pacific,18,2700,1620
2024-04-04,Mouse Precision,Peripherals,North America,25,2000,1200
2024-04-08,Headset Pro,Audio,Europe,9,1800,1080
2024-04-12,Webcam HD,Cameras,Latin America,6,720,432
2024-04-16,SSD 1TB,Storage,Middle East,20,2000,1200
2024-04-20,Router WiFi6,Networking,North America,11,1980,1188
2024-05-05,Laptop Pro,Computers,Asia Pacific,4,4800,2800
2024-05-09,Tablet Air,Computers,Latin America,3,1950,1170
2024-05-13,SmartPhone X,Phones,Europe,12,10800,6300
2024-05-17,Monitor 4K,Displays,North America,5,2750,1650
2024-05-21,Keyboard Elite,Peripherals,Middle East,8,1200,720
2024-06-02,Mouse Precision,Peripherals,Asia Pacific,30,2400,1440
2024-06-06,Headset Pro,Audio,North America,7,1400,840
2024-06-10,Webcam HD,Cameras,Europe,10,1200,720
2024-06-14,SSD 1TB,Storage,Latin America,12,1200,720
2024-06-18,Router WiFi6,Networking,Asia Pacific,9,1620,972`;

function loadSample(e){e.stopPropagation();parseCSV(SAMPLE,'sample_sales.csv');}

const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
function handleFile(f){if(!f)return;const r=new FileReader();r.onload=e=>parseCSV(e.target.result,f.name);r.readAsText(f);}

function parseCSV(text,name){
  const sep=text.includes('\t')?'\t':',';
  const lines=text.trim().split('\n');
  const headers=lines[0].split(sep).map(h=>h.trim().replace(/"/g,''));
  const rows=lines.slice(1).map(l=>{const v=l.split(sep).map(v=>v.trim().replace(/"/g,''));return Object.fromEntries(headers.map((h,i)=>[h,v[i]||'']));}).filter(r=>Object.values(r).some(v=>v));
  const types={};
  headers.forEach(h=>{const vs=rows.map(r=>r[h]).filter(v=>v!=='');const nv=vs.filter(v=>!isNaN(parseFloat(v))&&isFinite(v));types[h]=nv.length/vs.length>0.8?'numeric':'categorical';});
  showAnalysis(rows,headers,types,name);
  saveToCosmosDB(rows,headers,types,name);
}

async function saveToCosmosDB(rows,headers,types,filename){
  if(!API_BASE){document.getElementById('db-status').textContent='⚠️ API_BASE not set — analysis not saved to Cosmos DB';return;}
  try{
    const nc=headers.filter(h=>types[h]==='numeric');
    const cc=headers.filter(h=>types[h]==='categorical');
    const stats={};
    headers.forEach(h=>{
      const vs=rows.map(r=>r[h]).filter(v=>v!=='');
      if(types[h]==='numeric'){
        const ns=vs.map(v=>parseFloat(v)).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
        stats[h]={min:ns[0],max:ns[ns.length-1],mean:parseFloat((ns.reduce((a,b)=>a+b,0)/ns.length).toFixed(2)),unique:new Set(vs).size,count:ns.length};
      }else{
        const freq={};vs.forEach(v=>{freq[v]=(freq[v]||0)+1;});
        const top=Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
        stats[h]={unique:new Set(vs).size,topValue:top?.[0],topFreq:top?.[1],count:vs.length};
      }
    });
    const saved=await CsvAPI.save({filename,rows:rows.length,columns:headers.length,headers,numericCols:nc,catCols:cc,stats});
    document.getElementById('db-status').textContent=`✓ Analysis saved to Azure Cosmos DB · id: ${saved.id?.slice(0,8)}`;
    loadHistory();
  }catch(e){document.getElementById('db-status').textContent='✗ Cosmos DB save error: '+e.message;}
}

async function loadHistory(){
  if(!API_BASE)return;
  try{
    const history=await CsvAPI.list();
    if(!history.length){document.getElementById('history-section').style.display='none';return;}
    document.getElementById('history-section').style.display='block';
    document.getElementById('history-list').innerHTML=history.map(h=>`
      <div class="hist-item">
        <div class="hist-icon">📊</div>
        <div class="hist-body">
          <div class="hist-name">${h.filename}</div>
          <div class="hist-meta">${h.rows} rows · ${h.columns} columns · ${new Date(h.analyzedAt).toLocaleDateString()} · Cosmos id: ${(h.id||'').slice(0,8)}</div>
        </div>
        <div class="pills">
          ${(h.numericCols||[]).slice(0,3).map(c=>`<span class="pill g">${c}</span>`).join('')}
          ${(h.catCols||[]).slice(0,2).map(c=>`<span class="pill">${c}</span>`).join('')}
          <span class="pill cosmos">☁️ Cosmos</span>
        </div>
      </div>`).join('');
  }catch(e){console.error('History error:',e);}
}

function showAnalysis(rows,headers,types,name){
  document.getElementById('analysis').style.display='flex';
  const nc=headers.filter(h=>types[h]==='numeric'),cc=headers.filter(h=>types[h]==='categorical');
  document.getElementById('file-info').innerHTML=`
    <div><div class="file-info-name">📄 ${name}</div><div class="file-info-meta">${rows.length.toLocaleString()} rows · ${headers.length} columns</div></div>
    <div class="pills"><span class="pill g">${nc.length} numeric</span><span class="pill">${cc.length} categorical</span><span class="pill cosmos">☁️ Saving to Cosmos</span></div>`;
  document.getElementById('stats-grid').innerHTML=headers.map(h=>{
    const vs=rows.map(r=>r[h]).filter(v=>v!=='');const unique=new Set(vs).size;
    if(types[h]==='numeric'){const ns=vs.map(v=>parseFloat(v)).filter(v=>!isNaN(v));const s=[...ns].sort((a,b)=>a-b);const mean=ns.reduce((a,b)=>a+b,0)/ns.length;const med=s[Math.floor(s.length/2)];
      return`<div class="stat-card"><div class="stat-col-name">${h}<span class="type-badge">numeric</span></div><div class="stat-row"><span>Count</span><span>${ns.length}</span></div><div class="stat-row"><span>Min</span><span>${s[0]?.toFixed?.(2)??s[0]}</span></div><div class="stat-row"><span>Max</span><span>${s[s.length-1]?.toFixed?.(2)??''}</span></div><div class="stat-row"><span>Mean</span><span>${mean.toFixed(2)}</span></div><div class="stat-row"><span>Median</span><span>${med?.toFixed?.(2)??med}</span></div><div class="stat-row"><span>Unique</span><span>${unique}</span></div></div>`;}
    else{const freq={};vs.forEach(v=>{freq[v]=(freq[v]||0)+1;});const top=Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
      return`<div class="stat-card"><div class="stat-col-name">${h}<span class="type-badge">categorical</span></div><div class="stat-row"><span>Count</span><span>${vs.length}</span></div><div class="stat-row"><span>Unique</span><span>${unique}</span></div><div class="stat-row"><span>Top</span><span>${top?.[0]?.slice?.(0,14)??'-'}</span></div><div class="stat-row"><span>Top freq</span><span>${top?.[1]??0}</span></div><div class="stat-row"><span>Missing</span><span>${rows.length-vs.length}</span></div></div>`;}
  }).join('');
  if(HC)HC.destroy();
  const nc0=nc[0];
  if(nc0){document.getElementById('hist-title').textContent='Distribution: '+nc0;const nums=rows.map(r=>parseFloat(r[nc0])).filter(v=>!isNaN(v));const mn=Math.min(...nums),mx=Math.max(...nums),bw=(mx-mn)/10||1;const counts=new Array(10).fill(0);nums.forEach(v=>{const i=Math.min(Math.floor((v-mn)/bw),9);counts[i]++;});HC=new Chart(document.getElementById('hist-chart'),{type:'bar',data:{labels:counts.map((_,i)=>(mn+i*bw).toFixed(1)),datasets:[{label:'Freq',data:counts,backgroundColor:'rgba(240,168,62,0.6)',borderColor:'#f0a83e',borderWidth:1,borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b7280'}},y:{ticks:{color:'#6b7280'}}}}});}
  if(BC)BC.destroy();
  const cc0=cc[0];
  if(cc0){document.getElementById('bar-title').textContent='Top: '+cc0;const freq={};rows.forEach(r=>{if(r[cc0])freq[r[cc0]]=(freq[r[cc0]]||0)+1;});const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8);BC=new Chart(document.getElementById('bar-chart'),{type:'bar',data:{labels:sorted.map(s=>s[0].slice(0,16)),datasets:[{label:'Count',data:sorted.map(s=>s[1]),backgroundColor:'rgba(62,240,200,0.55)',borderColor:'#3ef0c8',borderWidth:1,borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b7280',maxRotation:30}},y:{ticks:{color:'#6b7280'}}}}});}
  let tbl=`<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
  rows.slice(0,50).forEach(r=>{tbl+=`<tr>${headers.map(h=>`<td>${r[h]}</td>`).join('')}</tr>`;});
  document.getElementById('table-div').innerHTML=tbl+'</tbody></table>';
  document.getElementById('analysis').scrollIntoView({behavior:'smooth'});
}

// Init
async function init(){
  if(!API_BASE){document.getElementById('db-status').textContent='⚠️ API_BASE not configured — set window.PORTFOLIO_API_BASE to enable Cosmos DB';return;}
  await loadHistory();
  document.getElementById('db-status').textContent=`✓ Azure Cosmos DB connected · user: ${USER_ID}`;
}
init();
</script>
</body>
</html>
