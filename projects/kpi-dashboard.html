<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Operations KPI Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0c10;--surface:#111318;--surface2:#181b22;--border:#1f232e;--accent:#3ef0c8;--text:#e2e6f0;--muted:#6b7280;--warn:#f0a83e;--danger:#f87171;--mono:'Space Mono',monospace}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-y:auto}
    header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:100}
    header h1{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
    .filters{display:flex;gap:.5rem;flex-wrap:wrap}
    .filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:.35rem .9rem;font-size:.8rem;cursor:pointer;font-family:var(--mono);transition:all .2s}
    .filter-btn.active{background:rgba(62,240,200,.12);border-color:rgba(62,240,200,.4);color:var(--accent)}
    .dashboard{padding:1.25rem;display:flex;flex-direction:column;gap:1.25rem}
    /* KPI Cards */
    .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;position:relative;overflow:hidden;transition:transform .2s}
    .kpi-card:hover{transform:translateY(-2px)}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
    .kpi-card.green::before{background:var(--accent)}
    .kpi-card.blue::before{background:#60a5fa}
    .kpi-card.warn::before{background:var(--warn)}
    .kpi-card.purple::before{background:#a78bfa}
    .kpi-card.red::before{background:var(--danger)}
    .kpi-label{font-size:.72rem;color:var(--muted);font-family:var(--mono);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
    .kpi-value{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;line-height:1}
    .kpi-value.green{color:var(--accent)}
    .kpi-value.blue{color:#60a5fa}
    .kpi-value.warn{color:var(--warn)}
    .kpi-value.purple{color:#a78bfa}
    .kpi-value.red{color:var(--danger)}
    .kpi-delta{font-size:.75rem;margin-top:.4rem}
    .kpi-delta.up{color:var(--accent)}
    .kpi-delta.down{color:var(--danger)}
    /* Charts row */
    .charts-row{display:grid;grid-template-columns:2fr 1fr;gap:1rem}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
    .chart-title{font-size:.85rem;font-weight:600;margin-bottom:1rem;color:var(--text)}
    .chart-sub{font-size:.72rem;color:var(--muted);font-family:var(--mono)}
    /* Bottom row */
    .bottom-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
    /* Anomaly panel */
    .anomaly-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
    .anomaly-panel h3{font-size:.85rem;font-weight:600;margin-bottom:1rem}
    .anomaly-item{display:flex;align-items:flex-start;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border)}
    .anomaly-item:last-child{border-bottom:none}
    .anomaly-icon{font-size:1rem;flex-shrink:0}
    .anomaly-text{font-size:.82rem;color:var(--muted)}
    .anomaly-text strong{color:var(--text);display:block;margin-bottom:.1rem}
    .anom-badge{font-family:var(--mono);font-size:.65rem;padding:.15rem .45rem;border-radius:999px}
    .anom-badge.high{background:rgba(248,113,113,.12);color:var(--danger);border:1px solid rgba(248,113,113,.2)}
    .anom-badge.med{background:rgba(240,168,62,.12);color:var(--warn);border:1px solid rgba(240,168,62,.2)}
    /* Rankings */
    .rank-item{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--border)}
    .rank-item:last-child{border-bottom:none}
    .rank-num{font-family:var(--mono);font-size:.75rem;color:var(--muted);width:1.2rem}
    .rank-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
    .rank-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .6s}
    .rank-label{font-size:.8rem;width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rank-val{font-family:var(--mono);font-size:.75rem;color:var(--accent);width:70px;text-align:right}
    ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    @media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}.bottom-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:.75rem">
    <span style="font-size:1.3rem">⚡</span>
    <h1>Operations KPI Dashboard</h1>
  </div>
  <div class="filters">
    <button class="filter-btn" onclick="setFilter('1M',this)">1M</button>
    <button class="filter-btn" onclick="setFilter('3M',this)">3M</button>
    <button class="filter-btn active" onclick="setFilter('6M',this)">6M</button>
    <button class="filter-btn" onclick="setFilter('YTD',this)">YTD</button>
  </div>
</header>
<div class="dashboard">
  <!-- KPI Cards -->
  <div class="kpi-row">
    <div class="kpi-card green"><div class="kpi-label">Total Revenue</div><div class="kpi-value green" id="kpi-rev">$0</div><div class="kpi-delta up" id="kpi-rev-d">▲ 0%</div></div>
    <div class="kpi-card blue"><div class="kpi-label">Net Profit</div><div class="kpi-value blue" id="kpi-profit">$0</div><div class="kpi-delta up" id="kpi-profit-d">▲ 0%</div></div>
    <div class="kpi-card warn"><div class="kpi-label">Orders</div><div class="kpi-value warn" id="kpi-orders">0</div><div class="kpi-delta up" id="kpi-orders-d">▲ 0%</div></div>
    <div class="kpi-card purple"><div class="kpi-label">Avg Order Value</div><div class="kpi-value purple" id="kpi-aov">$0</div><div class="kpi-delta up" id="kpi-aov-d">▲ 0%</div></div>
    <div class="kpi-card red"><div class="kpi-label">Profit Margin</div><div class="kpi-value red" id="kpi-margin">0%</div><div class="kpi-delta" id="kpi-margin-d">— 0%</div></div>
  </div>

  <!-- Main charts -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Revenue vs Cost Trend <span class="chart-sub">&nbsp;Monthly</span></div>
      <canvas id="trend-chart" height="120"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Revenue by Region</div>
      <canvas id="region-chart" height="180"></canvas>
    </div>
  </div>

  <!-- Bottom row -->
  <div class="bottom-row">
    <div class="chart-card">
      <div class="chart-title">Top Products by Revenue</div>
      <div id="product-rankings"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Category Breakdown</div>
      <canvas id="cat-chart" height="200"></canvas>
    </div>
    <div class="anomaly-panel">
      <h3>⚠️ Anomaly Alerts</h3>
      <div id="anomaly-list"></div>
    </div>
  </div>
</div>

<script>
// Data generation
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
const MONTHS_ALL=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const REGIONS=['North America','Europe','Asia Pacific','Latin America','Middle East'];
const PRODUCTS=['Laptop Pro','Tablet Air','SmartPhone X','Monitor 4K','Keyboard Elite','Mouse Precision','Headset Pro','Webcam HD','SSD 1TB','Router WiFi6'];
const CATS=['Computers','Phones','Displays','Peripherals','Audio','Cameras','Storage','Networking'];

// Monthly data for full year
const monthlyData=MONTHS_ALL.map((m,i)=>{
  const base=200000+i*8000+rnd(-20000,25000);
  const rev=parseFloat(base.toFixed(0));
  const cost=parseFloat((rev*0.58).toFixed(0));
  return{month:m,revenue:rev,cost,profit:rev-cost,orders:rnd(80,180)};
});

const regionData=REGIONS.map(r=>({region:r,revenue:rnd(150000,600000)}));
const productData=PRODUCTS.map(p=>({product:p,revenue:rnd(50000,350000)})).sort((a,b)=>b.revenue-a.revenue);
const catData=CATS.map(c=>({cat:c,revenue:rnd(80000,400000)}));

let trendChart,regionChart,catChart;
let currentFilter='6M';

function getSlice(filter){
  if(filter==='1M')return monthlyData.slice(-1);
  if(filter==='3M')return monthlyData.slice(-3);
  if(filter==='6M')return monthlyData.slice(-6);
  return monthlyData; // YTD
}

function fmt(n){
  if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';
  if(n>=1000)return'$'+(n/1000).toFixed(0)+'K';
  return'$'+n;
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  update();
}

function update(){
  const slice=getSlice(currentFilter);
  const totalRev=slice.reduce((a,r)=>a+r.revenue,0);
  const totalCost=slice.reduce((a,r)=>a+r.cost,0);
  const totalProfit=slice.reduce((a,r)=>a+r.profit,0);
  const totalOrders=slice.reduce((a,r)=>a+r.orders,0);
  const margin=((totalProfit/totalRev)*100).toFixed(1);
  const aov=(totalRev/totalOrders).toFixed(0);

  document.getElementById('kpi-rev').textContent=fmt(totalRev);
  document.getElementById('kpi-rev-d').textContent='▲ '+rnd(5,18)+'% vs prev period';
  document.getElementById('kpi-profit').textContent=fmt(totalProfit);
  document.getElementById('kpi-profit-d').textContent='▲ '+rnd(3,12)+'% vs prev period';
  document.getElementById('kpi-orders').textContent=totalOrders.toLocaleString();
  document.getElementById('kpi-orders-d').textContent='▲ '+rnd(2,9)+'% vs prev period';
  document.getElementById('kpi-aov').textContent='$'+aov;
  document.getElementById('kpi-aov-d').textContent='▲ '+rnd(1,6)+'% vs prev period';
  document.getElementById('kpi-margin').textContent=margin+'%';
  document.getElementById('kpi-margin-d').className='kpi-delta '+(margin>35?'up':'down');
  document.getElementById('kpi-margin-d').textContent=(margin>35?'▲':'▼')+' '+Math.abs(rnd(1,4))+'% vs prev';

  // Trend chart
  const labels=slice.map(r=>r.month);
  if(trendChart){trendChart.destroy();}
  trendChart=new Chart(document.getElementById('trend-chart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Revenue',data:slice.map(r=>r.revenue),backgroundColor:'rgba(62,240,200,0.5)',borderColor:'#3ef0c8',borderWidth:1,borderRadius:4},
      {label:'Cost',data:slice.map(r=>r.cost),backgroundColor:'rgba(248,113,113,0.35)',borderColor:'#f87171',borderWidth:1,borderRadius:4},
      {label:'Profit',type:'line',data:slice.map(r=>r.profit),borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,0.1)',borderWidth:2,fill:true,tension:.4,pointRadius:3}
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#e2e6f0',boxWidth:12}}},scales:{x:{ticks:{color:'#6b7280'}},y:{ticks:{color:'#6b7280',callback:v=>fmt(v)}}}}
  });

  // Region chart
  if(regionChart){regionChart.destroy();}
  regionChart=new Chart(document.getElementById('region-chart'),{
    type:'doughnut',
    data:{labels:REGIONS,datasets:[{data:regionData.map(r=>r.revenue),backgroundColor:['rgba(62,240,200,0.7)','rgba(108,99,255,0.7)','rgba(96,165,250,0.7)','rgba(240,168,62,0.7)','rgba(248,113,113,0.7)'],borderWidth:0,hoverOffset:8}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#e2e6f0',boxWidth:10,font:{size:11}}}}}
  });

  // Product rankings
  const maxRev=productData[0].revenue;
  document.getElementById('product-rankings').innerHTML=productData.slice(0,7).map((p,i)=>
    `<div class="rank-item"><div class="rank-num">${i+1}</div><div class="rank-label">${p.product}</div><div class="rank-bar-wrap"><div class="rank-bar" style="width:${(p.revenue/maxRev*100).toFixed(0)}%"></div></div><div class="rank-val">${fmt(p.revenue)}</div></div>`
  ).join('');

  // Category chart
  if(catChart){catChart.destroy();}
  catChart=new Chart(document.getElementById('cat-chart'),{
    type:'bar',
    data:{labels:catData.map(c=>c.cat),datasets:[{label:'Revenue',data:catData.map(c=>c.revenue),backgroundColor:'rgba(108,99,255,0.6)',borderColor:'#6c63ff',borderWidth:1,borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b7280',callback:v=>fmt(v)}},y:{ticks:{color:'#6b7280',font:{size:11}}}}}
  });

  // Anomalies
  const anomalies=[
    {icon:'🔴',title:'Revenue Drop — Latin America',desc:'20% below 3-month average. Investigate supply chain.',badge:'high'},
    {icon:'🟡',title:'High Return Rate — SmartPhone X',desc:'Return rate 8.2% vs 3.1% baseline. QA review needed.',badge:'med'},
    {icon:'🔴',title:'Cost Spike — Q4 Logistics',desc:'Logistics cost up 31%. Exceeds monthly budget.',badge:'high'},
    {icon:'🟡',title:'Slow Inventory — Webcam HD',desc:'DSO 42 days vs target 28. Clear stock action needed.',badge:'med'},
  ];
  document.getElementById('anomaly-list').innerHTML=anomalies.map(a=>
    `<div class="anomaly-item"><div class="anomaly-icon">${a.icon}</div><div class="anomaly-text"><strong>${a.title} <span class="anom-badge ${a.badge}">${a.badge.toUpperCase()}</span></strong>${a.desc}</div></div>`
  ).join('');
}

update();
</script>
</body>
</html>
